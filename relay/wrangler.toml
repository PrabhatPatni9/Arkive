name = "arkive-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# account_id is supplied at deploy time via CLOUDFLARE_ACCOUNT_ID (CI action input / env),
# so it is not hard-coded here. Local deploy: `CLOUDFLARE_ACCOUNT_ID=... npx wrangler deploy`.

[[d1_databases]]
binding = "DB"
database_name = "arkive-relay"
database_id = "d050374e-99db-4d1d-9ff4-ce593233f5c4"

[[r2_buckets]]
binding = "OPS_BUCKET"
bucket_name = "arkive-ops"

# Custom domain relay-arkive.punyakosh.in is managed via Cloudflare Workers Domains API
# (not via wrangler routes — avoids needing Zone:Edit scope on the deploy token)

[vars]
VAPID_PUBLIC_KEY = "BEZtPXL5k8gXRrikVSezaj9osQVsUReRvHzo-6ZQLxqYqlbwjXcEtOsLbpMZOBdFrfzRPby-iUNDk5AmpFNYE6k"
