name = "arkive-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "arkive-relay"
# Replace with real D1 database UUID from `wrangler d1 create arkive-relay`
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "OPS_BUCKET"
bucket_name = "arkive-ops"

[vars]
VAPID_PUBLIC_KEY = ""

# Set secrets via `wrangler secret put`:
# VAPID_PRIVATE_KEY
