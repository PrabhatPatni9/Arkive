name: Deploy Web App

on:
  push:
    branches: [main]
    paths-ignore:
      - 'relay/**'
      - '.github/workflows/deploy-relay.yml'
      - '.github/workflows/build-apk.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_RELAY_URL: ${{ secrets.VITE_RELAY_URL }}
          VITE_UPDATE_PUBKEY: ${{ secrets.VITE_UPDATE_PUBKEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_RAZORPAY_KEY: ${{ secrets.VITE_RAZORPAY_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=arkive --commit-dirty=true
