name: Build and Sign APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only sign on pushes to main (not on PRs, not on feature branches)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # required to publish the signed APK as a GitHub Release asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_RELAY_URL: ${{ secrets.VITE_RELAY_URL }}
          VITE_UPDATE_PUBKEY: ${{ secrets.VITE_UPDATE_PUBKEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_RAZORPAY_KEY: ${{ secrets.VITE_RAZORPAY_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        env:
          BUILD_TOOLS_VERSION: '34.0.0'
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          APK="${{ steps.sign.outputs.signedReleaseFile }}"
          echo "Verifying: $APK"
          jarsigner -verify -verbose -certs "$APK"
          echo "Signature OK."

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: arkive-${{ github.sha }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 30

      - name: Upload APK to R2 release store
        run: |
          APK="${{ steps.sign.outputs.signedReleaseFile }}"
          SHA256=$(sha256sum "$APK" | cut -d' ' -f1)
          echo "SIGNED_APK_PATH=$APK" >> "$GITHUB_ENV"
          echo "APK_SHA256=$SHA256" >> "$GITHUB_ENV"
          # Store at _release/<sha256> in R2; relay serves it at GET /release/<sha256>
          npx wrangler r2 object put "arkive-ops/_release/$SHA256" \
            --file="$APK" \
            --content-type="application/vnd.android.package-archive" \
            --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: relay

      - name: Read app version from package.json
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Sign and publish UpdateManifest
        run: node scripts/sign-manifest.mjs
        env:
          APK_SIGNING_SEED: ${{ secrets.APK_SIGNING_SEED }}
          RELAY_URL: ${{ secrets.VITE_RELAY_URL }}
          RELAY_ADMIN_TOKEN: ${{ secrets.RELAY_ADMIN_TOKEN }}
          APK_PATH: ${{ env.SIGNED_APK_PATH }}
          BUILD_NUMBER: ${{ github.run_number }}
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Stage APK as arkive.apk
        run: cp "$SIGNED_APK_PATH" arkive.apk

      - name: Publish signed APK as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Stable tag per build so releases/latest always resolves to the newest signed APK.
          # The asset is always named arkive.apk, so the download URL never changes:
          #   https://github.com/${{ github.repository }}/releases/latest/download/arkive.apk
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: Arkive v${{ env.APP_VERSION }} (build ${{ github.run_number }})
          body: |
            Signed Android APK for Arkive v${{ env.APP_VERSION }} (build ${{ github.run_number }}).

            - SHA-256: `${{ env.APK_SHA256 }}`
            - Sideload only (not on Play Store). On first install, allow "install unknown apps".
            - The app verifies its own future updates with an Ed25519-signed manifest.
          files: arkive.apk
          make_latest: true
