name: Build and Sign APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only sign on pushes to main (not on PRs, not on feature branches)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        env:
          BUILD_TOOLS_VERSION: '34.0.0'
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          APK="${{ steps.sign.outputs.signedReleaseFile }}"
          echo "Verifying: $APK"
          jarsigner -verify -verbose -certs "$APK"
          echo "Signature OK."

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: arkive-${{ github.sha }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 30

      # The relay's /version endpoint serves a signed UpdateManifest.
      # Phase 1+ will populate this step with the manifest signing script.
      - name: Publish version manifest (stub)
        run: |
          echo "TODO Phase 1+: sign and upload UpdateManifest to relay /version"
